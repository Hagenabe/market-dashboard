name: Daily Market Data Update

on:
  # 平日 8:05 JST (= 23:05 UTC 前日) に自動実行
  schedule:
    - cron: '5 23 * * 0-4'
  # GitHub の Actions タブから手動でも実行できる
  workflow_dispatch:

permissions:
  contents: write      # データJSONのコミット・プッシュに必要

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      # ── 1. チェックアウト ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python セットアップ & データ取得 ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_market_data.py

      # ── 3. 更新したJSONをコミット → プッシュ → Netlify が自動ビルド ──
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "No data changes" || \
            git commit -m "data: update market data $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push

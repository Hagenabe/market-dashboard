name: Daily Market Data Update & Deploy

on:
  # 平日 8:05 JST (= 23:05 UTC 前日) に自動実行
  schedule:
    - cron: '5 23 * * 0-4'
  # GitHub の Actions タブから手動でも実行できる
  workflow_dispatch:

permissions:
  contents: write      # データJSONのコミットに必要
  pages: write         # GitHub Pages デプロイに必要
  id-token: write      # GitHub Pages OIDC に必要

jobs:
  fetch-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. チェックアウト ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python セットアップ & データ取得 ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_market_data.py

      # ── 3. 更新したJSONをコミット ──
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "No data changes" || \
            git commit -m "data: update market data $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push

      # ── 4. Node セットアップ & ビルド ──
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        env:
          # リポジトリ名を base URL に設定 (例: /market-dashboard/)
          # 独自ドメインを使う場合は '/' に変更
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      # ── 5. GitHub Pages にデプロイ ──
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
